<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Find Your Record · hazzp24</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --black:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f2ede6;--muted:#777;--faint:#333;
  --orange:#FF7300;--green:#00C900;--yellow:#FFD100;--blue:#0075FF;--purple:#9A4CFF;
}
html,body{min-height:100%;background:var(--black);color:var(--text);font-family:'Work Sans',sans-serif;font-weight:300}
body{display:flex;flex-direction:column;align-items:center;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,24px)}

.header{width:100%;max-width:480px;padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:1px;color:#fff}
.logo span{color:var(--orange)}
.back-link{font-size:12px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px}
.back-link:hover{color:var(--text)}

.stage{width:100%;max-width:480px;padding:0 20px;flex:1;display:flex;flex-direction:column}

/* Intro screen */
.intro{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 0}
.intro-icon{font-size:52px;margin-bottom:16px}
.intro-title{font-family:'Anton',sans-serif;font-size:32px;color:#fff;margin-bottom:8px;line-height:1.1}
.intro-sub{font-size:15px;color:var(--muted);line-height:1.5;margin-bottom:32px;max-width:300px}
.btn-start{padding:14px 32px;border-radius:12px;border:none;background:var(--orange);color:#000;font-family:'Work Sans',sans-serif;font-weight:500;font-size:16px;cursor:pointer;transition:opacity .15s}
.btn-start:hover{opacity:0.88}

/* Quiz screen */
.quiz{flex:1;display:flex;flex-direction:column;padding-top:24px}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));border-radius:2px;transition:width .4s ease}
.q-number{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.q-text{font-family:'Anton',sans-serif;font-size:26px;color:#fff;line-height:1.15;margin-bottom:24px}
.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 16px;border-radius:12px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Work Sans',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:all .15s;line-height:1.3}
.opt:hover{border-color:var(--border2);background:var(--surface2)}
.opt.selected{border-color:var(--orange);background:rgba(255,115,0,.1);color:var(--orange)}

.thinking{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.thinking-dots{display:flex;gap:6px}
.thinking-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);animation:tdot .8s infinite}
.thinking-dot:nth-child(2){animation-delay:.15s}
.thinking-dot:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,100%{opacity:.2}50%{opacity:1}}
.thinking-label{font-size:14px;color:var(--muted)}

/* Results */
.results{flex:1;display:flex;flex-direction:column;padding-top:16px}
.results-title{font-family:'Anton',sans-serif;font-size:24px;color:#fff;margin-bottom:4px}
.results-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.pick-card{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center;position:relative;overflow:hidden}
.pick-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.pick-card.rank-1::before{background:var(--yellow)}
.pick-card.rank-2::before{background:var(--muted)}
.pick-card.rank-3::before{background:#8a6030}
.pick-rank{font-family:'Anton',sans-serif;font-size:28px;line-height:1;flex-shrink:0;width:28px;text-align:center}
.pick-card.rank-1 .pick-rank{color:var(--yellow)}
.pick-card.rank-2 .pick-rank{color:var(--muted)}
.pick-card.rank-3 .pick-rank{color:#8a6030}
.pick-art{width:60px;height:60px;border-radius:8px;object-fit:cover;background:var(--surface2);flex-shrink:0;border:0.5px solid var(--border)}
.pick-art-ph{width:60px;height:60px;border-radius:8px;background:var(--surface2);flex-shrink:0;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center}
.pick-info{flex:1;min-width:0}
.pick-artist{font-size:12px;color:var(--muted);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-title{font-size:15px;font-weight:400;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pick-tagline{font-size:12px;color:var(--orange);font-style:italic;line-height:1.3}
.pick-links{display:flex;gap:6px;margin-top:6px}
.pick-link{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;transition:opacity .15s}
.pick-link:hover{opacity:0.8}
.pick-link.spotify{background:rgba(29,185,84,.12);border:0.5px solid rgba(29,185,84,.25);color:#1DB954}
.pick-link.discogs{background:rgba(255,115,0,.1);border:0.5px solid rgba(255,115,0,.2);color:var(--orange)}

.result-actions{display:flex;gap:8px;margin-top:8px;padding-bottom:24px}
.btn-restart{flex:1;padding:12px;border-radius:10px;border:none;background:var(--orange);color:#000;font-family:'Work Sans',sans-serif;font-weight:500;font-size:14px;cursor:pointer}
.btn-share{flex:0 0 auto;padding:12px 16px;border-radius:10px;border:0.5px solid var(--border2);background:transparent;color:var(--text);font-family:'Work Sans',sans-serif;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px}

@keyframes slide-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:slide-up .3s ease forwards}
</style>
</head>
<body>

<div class="header">
  <div class="logo">VINYL <span>·</span> hazzp24</div>
  <a class="back-link" href="/">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Collection
  </a>
</div>

<div class="stage" id="stage">
  <!-- Intro -->
  <div class="intro" id="screen-intro">
    <div class="intro-icon">🎵</div>
    <div class="intro-title">Find your record</div>
    <div class="intro-sub">Answer a few questions and I'll find the perfect record from Harry's collection for your vibe right now.</div>
    <button class="btn-start" onclick="startQuiz()">Let's go</button>
  </div>
</div>

<script>
const COLLECTION_URL = '/api/sheets';
const FINDER_URL = '/api/finder';

let collection = [];
let answers = [];
let questionsSoFar = [];
let currentQ = null;
let totalQs = 3;

// Load collection on page load
async function loadCollection() {
  try {
    const r = await fetch(COLLECTION_URL);
    if (r.ok) {
      const d = await r.json();
      collection = (d.collection || []).map(r => ({
        artist: String(r.artist || ''),
        title: String(r.title === 0.999 ? '99.9%' : r.title || ''),
        year: String(r.year || ''),
        genre: String(r.genre || ''),
        releaseId: String(r.releaseId || ''),
        image: String(r.image || '')
      })).filter(r => r.artist);
    }
  } catch {}
}

loadCollection();

function setScreen(html) {
  document.getElementById('stage').innerHTML = html;
}

function startQuiz() {
  answers = [];
  questionsSoFar = [];
  nextQuestion();
}

async function nextQuestion() {
  // Show thinking dots while fetching next question
  setScreen(`
    <div class="thinking" id="screen-thinking">
      <div class="thinking-dots">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
      </div>
      <div class="thinking-label">Getting your next question…</div>
    </div>`);

  try {
    const r = await fetch(FINDER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mode: 'question',
        collection,
        answers,
        questionsSoFar
      })
    });
    const d = await r.json();
    currentQ = d.question;
    questionsSoFar.push({ id: currentQ.id, q: currentQ.q });
    showQuestion(currentQ);
  } catch {
    setScreen(`<div class="intro"><div class="intro-icon">😕</div><div class="intro-title">Something went wrong</div><button class="btn-start" onclick="startQuiz()" style="margin-top:24px">Try again</button></div>`);
  }
}

function showQuestion(q) {
  const qNum = answers.length + 1;
  const progress = Math.round((qNum / 6) * 100);

  setScreen(`
    <div class="quiz animate-in" id="screen-quiz">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="q-number">Question ${qNum}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o, i) => `<button class="opt" onclick="selectAnswer(${i})">${o}</button>`).join('')}
      </div>
    </div>`);
}

async function selectAnswer(idx) {
  const opt = currentQ.opts[idx];

  // Highlight selection
  document.querySelectorAll('.opt').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
    el.disabled = true;
  });

  answers.push({ q: currentQ.q, a: opt, id: currentQ.id });

  // After 5 questions, go to results
  if (answers.length >= 5) {
    setTimeout(getRecommendations, 400);
  } else {
    setTimeout(nextQuestion, 400);
  }
}

async function getRecommendations() {
  setScreen(`
    <div class="thinking" id="screen-thinking">
      <div class="thinking-dots">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
      </div>
      <div class="thinking-label">Finding your perfect records…</div>
    </div>`);

  try {
    const r = await fetch(FINDER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'recommend', collection, answers })
    });
    const d = await r.json();
    showResults(d.picks || []);
  } catch {
    setScreen(`<div class="intro"><div class="intro-icon">😕</div><div class="intro-title">Something went wrong</div><button class="btn-start" onclick="startQuiz()" style="margin-top:24px">Try again</button></div>`);
  }
}

async function showResults(picks) {
  const cardsHtml = picks.map(p => {
    const collRecord = collection.find(r =>
      r.artist.toLowerCase() === p.artist.toLowerCase() &&
      r.title.toLowerCase() === p.title.toLowerCase()
    );
    const imgSrc = collRecord?.image || '';
    const artHtml = imgSrc
      ? `<img class="pick-art" src="${imgSrc}" onerror="this.outerHTML='<div class=pick-art-ph><svg width=20 height=20 viewBox=\'0 0 24 24\' fill=none stroke=white stroke-width=1.5 opacity=.2><circle cx=12 cy=12 r=10/><circle cx=12 cy=12 r=3/></svg></div>'">`
      : `<div class="pick-art-ph"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" opacity=".2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>`;

    return `
      <div class="pick-card rank-${p.rank}">
        <div class="pick-rank">${p.rank}</div>
        ${artHtml}
        <div class="pick-info">
          <div class="pick-artist">${p.artist}</div>
          <div class="pick-title">${p.title}</div>
          <div class="pick-tagline">${p.tagline}</div>
        </div>
      </div>`;
  }).join('');

  setScreen(`
    <div class="results animate-in">
      <div class="results-title">Your picks 🎯</div>
      <div class="results-sub">Based on your vibe right now</div>
      ${cardsHtml}
      <div class="result-actions">
        <button class="btn-restart" onclick="startQuiz()">Try again</button>
        <button class="btn-share" onclick="shareResults()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share
        </button>
      </div>
    </div>`);

  // Fetch artwork for any cards missing it
  picks.forEach(async (p) => {
    const collRecord = collection.find(r =>
      r.artist.toLowerCase() === p.artist.toLowerCase() &&
      r.title.toLowerCase() === p.title.toLowerCase()
    );
    if (collRecord?.image) return; // already have it
    try {
      const rid = collRecord?.releaseId || '';
      let url = `/api/artwork?artist=${encodeURIComponent(p.artist)}&title=${encodeURIComponent(p.title)}`;
      if (rid) url += `&releaseId=${encodeURIComponent(rid)}`;
      const r = await fetch(url);
      if (r.ok) {
        const d = await r.json();
        if (d.url) {
          // Update matching img element
          document.querySelectorAll('.pick-art-ph').forEach(ph => {
            const card = ph.closest('.pick-card');
            const titleEl = card?.querySelector('.pick-title');
            if (titleEl?.textContent === p.title) {
              const img = document.createElement('img');
              img.className = 'pick-art';
              img.src = d.url;
              ph.replaceWith(img);
            }
          });
        }
      }
    } catch {}
  });
}

function shareResults() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: 'Find your record · hazzp24', url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.btn-share');
      if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share'; }, 2000); }
    });
  }
}
</script>
</body>
</html>
